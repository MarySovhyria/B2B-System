name: Deploy Vite to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prism-lite/package-lock.json

      - name: Install
        run: npm ci
        working-directory: prism-lite

      - name: Build
        run: npm run build
        working-directory: prism-lite

      - name: Disable Jekyll
        run: touch dist/.nojekyll
        working-directory: prism-lite

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: prism-lite/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
